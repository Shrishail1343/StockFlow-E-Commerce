[build]
  publish = "frontend"

# Proxy /api/* to the Spring Boot backend on Railway.
# After deploying the backend, replace the placeholder URL below
# with your actual Railway backend URL.
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_RAILWAY_BACKEND_URL/api/:splat"
  status = 200
  force  = true
  [redirects.headers]
    X-Forwarded-For = "netlify"
