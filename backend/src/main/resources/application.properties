spring.application.name=inventory-management

# Database — override with env vars in production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT — override JWT_SECRET in production
jwt.secret=${JWT_SECRET:InventoryMgmtSecretKey2024SuperSecureRandomString}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server — Railway/Render inject PORT automatically
server.port=${PORT:8080}
server.servlet.context-path=/api

# CORS — add your deployed frontend URL via CORS_ALLOWED_ORIGINS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}

# Logging
logging.level.com.inventory=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=INFO
