spring.application.name=inventory-management

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=InventoryMgmtSecretKey2024SuperSecureRandomString
jwt.expiration=86400000

# Server
server.port=8080
server.servlet.context-path=/api

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

# Logging
logging.level.com.inventory=DEBUG
logging.level.org.springframework.security=INFO
